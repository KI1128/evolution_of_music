<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>The Evolution of Music</title>
    <!-- 生成された座標データ -->
    <script src="coordinates.js"></script>

    <!-- 分割したCSSを読み込む -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="header-title">The Evolution of Music</div>

    <!-- ボタンをグループ化して横並び（Flexbox）にし、被りを防止 -->
    <div id="top-right-menu" style="position: absolute; top: 20px; right: 20px; z-index: 101; display: flex; gap: 10px; align-items: center;">
        <button id="lang-toggle-btn" onclick="toggleLanguage()" style="background: rgba(0, 0, 0, 0.7); color: white; padding: 8px 12px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; backdrop-filter: blur(5px); font-family: inherit;">🌐 English</button>
        <!-- styleを追加し、CSS側の絶対配置を上書き -->
        <a href="#" id="contact-btn" onclick="openContactModal(event)" style="position: relative; top: 0; right: 0;">💬 お問い合わせ・リクエスト</a>
    </div>

    <div id="tooltip"></div>

    <!-- お問い合わせ用のポップアップ（モーダル）の中身 -->
    <div id="contact-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="closeContactModal()">&times;</span>
            <h2 id="modal-title">📬 お問い合わせ・リクエスト</h2>
            <p id="modal-desc" style="color: #aaa; font-size: 13px;">このサイトへのジャンル追加や名盤のリクエストはこちらからお願いします！</p>

            <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
                <a href="https://forms.gle/43CrX7MASWM4oWDJ6" target="_blank" class="modal-link-btn" id="modal-btn-genre">
                    🎸 ジャンルの追加・修正をリクエスト
                </a>
                <a href="https://forms.gle/ge6uhWPP2ZUJNpqL6" target="_blank" class="modal-link-btn" id="modal-btn-milestone" style="background: #2E7D32;">
                    💿 名盤・マイルストーンをリクエスト
                </a>
                <a href="https://forms.gle/AUmN5CJtozPvYqxD7" target="_blank" class="modal-link-btn" id="modal-btn-other" style="background: #3d3d3d;">
                    📝 その他のお問い合わせ
                </a>
            </div>
        </div>
    </div>

    <button id="toggle-ui-btn" onclick="toggleUI()">👁️ 検索を非表示</button>

    <div id="ui">
        <label style="margin-bottom: 8px; font-size: 14px; font-weight: bold;">🔍 ジャンル・曲を検索</label>
        <input type="text" id="genre-search" placeholder="ジャンル、曲名、アーティスト...">
        <div id="genre-list"></div>
        <button onclick="resetView()">🗺️ 全体表示に戻す</button>
    </div>

    <div id="container">
        <img id="image" src="music_tree_optimized.svg" alt="Music Evolution Graph" draggable="false">
    </div>

    <div id="timeline-bar"></div>

    <!-- 分割したJavaScriptを読み込む -->
    <script src="script.js"></script>
</body>

</html>
